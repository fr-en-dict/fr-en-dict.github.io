<script>
/* â”€â”€ CONFIG â”€â”€ */
const SUGGESTIONS = ['manger','ĂŞtre','avoir','aller','faire','maison',
  'lumiĂ¨re','amour','cheval','enfant','en','eau','nuit','partir','livre'];

const REMOVE_SECTIONS = new Set([
  'pronunciation','descendants','further reading','references',
  'see also','homophones','translations','external links'
]);

/* â”€â”€ COOKIE BANNER â”€â”€ */
(function() {
  if (!localStorage.getItem('cookie_ok')) {
    document.getElementById('cookieBanner').style.display = 'flex';
  }
  document.getElementById('cookieAccept').onclick = function() {
    localStorage.setItem('cookie_ok', '1');
    document.getElementById('cookieBanner').style.display = 'none';
  };
})();

/* â”€â”€ DOM â”€â”€ */
const mainEl = document.getElementById('main');
const input  = document.getElementById('searchInput');
const btn    = document.getElementById('searchBtn');

btn.addEventListener('click', () => lookup());
input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

// URL param support: ?q=manger
(function() {
  const q = new URLSearchParams(location.search).get('q');
  if (q) { input.value = q; lookup(q); }
})();

/* â”€â”€ UTILS â”€â”€ */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normSec(s) { return s.toLowerCase().trim(); }

/* Move leading parenthetical labels to end of definition text.
   e.g. "(transitive) to eat" â†’ "to eat (transitive)"
   Works on a cloned li's innerHTML string. */
function reorderLabels(innerHTML) {
  // Plain-text leading labels: "(word, word) rest"
  return innerHTML.replace(
    /^(\s*(?:<[^>]+>)*\s*\([^)]+\)\s*(?:<\/[^>]+>)?\s*)+/,
    (match) => `\x01${match}`
  ).replace(/^([\s\S]*?)\x01([\s\S]*)$/, (_, after, labels) => {
    return after.trim() + ' ' + labels.trim();
  });
}

/* Rewrite wiktionary internal links â†’ lookup; external â†’ new tab */
function rewriteLinks(root) {
  root.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    const m = href.match(/(?:^\/wiki\/|wiktionary\.org\/wiki\/)([^#?]+)(#[^?]*)?/);
    if (m) {
      const word   = decodeURIComponent(m[1]).replace(/_/g, ' ');
      const anchor = m[2] || '';
      if (!anchor || anchor === '#French') {
        a.href = `?q=${encodeURIComponent(word)}`;
        a.addEventListener('click', e => { e.preventDefault(); lookup(word); });
      } else {
        a.href = `https://en.wiktionary.org/wiki/${m[1]}${anchor}`;
        a.target = '_blank'; a.rel = 'noopener';
      }
    } else if (/^(https?:)?\/\//.test(href)) {
      a.target = '_blank'; a.rel = 'noopener';
    }
  });
}

/* â”€â”€ FETCH â”€â”€ */
async function lookup(word) {
  const term = (word !== undefined ? word : input.value).trim();
  if (!term) return;
  input.value = term;
  history.replaceState(null, '', `?q=${encodeURIComponent(term)}`);

  mainEl.innerHTML = `<div class="state-loading"><div class="spinner"></div>
    <span style="font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--light)">SEARCHINGâ€¦</span></div>`;

  try {
    const res = await fetch(
      `https://en.wiktionary.org/api/rest_v1/page/html/${encodeURIComponent(term)}`
    );
    if (!res.ok) {
      showError(res.status === 404
        ? `No entry found for Â«\u00a0${esc(term)}\u00a0Â».`
        : `Error ${res.status} â€” could not reach Wiktionary.`);
      showSuggestions();
      return;
    }
    const html  = await res.text();
    const doc   = new DOMParser().parseFromString(html, 'text/html');
    const frNode = extractFrench(doc);
    if (!frNode) {
      showError(`No French entry found for Â«\u00a0${esc(term)}\u00a0Â».`);
      showSuggestions();
      return;
    }
    renderEntry(frNode, term);
  } catch(e) {
    showError('Network error â€” please check your connection.');
  }
}

/* â”€â”€ EXTRACT FRENCH SECTION â”€â”€ */
function extractFrench(doc) {
  // Try <section> wrapper first (newer Wiktionary HTML)
  for (const sec of doc.querySelectorAll('section')) {
    const h2 = sec.querySelector(':scope > h2');
    if (h2 && h2.textContent.replace(/\[.*?\]/g,'').trim() === 'French') return sec;
  }
  // Fallback: find h2 by text/id and collect siblings
  for (const h2 of doc.querySelectorAll('h2')) {
    const txt = h2.textContent.replace(/\[.*?\]/g,'').trim();
    const id  = h2.id || (h2.querySelector('[id]') || {}).id || '';
    if (txt === 'French' || id === 'French') {
      const frag = doc.createElement('div');
      let el = h2.nextElementSibling;
      while (el && el.tagName !== 'H2') {
        frag.appendChild(el.cloneNode(true));
        el = el.nextElementSibling;
      }
      return frag;
    }
  }
  return null;
}

/* â”€â”€ RENDER â”€â”€ */
function renderEntry(node, term) {
  const wrap = document.createElement('div');

  // Headword
  wrap.innerHTML = `
    <div class="entry-headword">${esc(term)}</div>
    <div class="entry-meta">
      <span>fr â†’ en</span>
      <a href="https://en.wiktionary.org/wiki/${encodeURIComponent(term)}#French"
         target="_blank" rel="noopener">view on Wiktionary â†—</a>
    </div>`;

  const children = [...node.children].filter(el => el.tagName !== 'H2');
  let buf      = null;
  let skip     = false;
  let secCount = 0;
  let adDone   = false;

  function flush() {
    if (!buf) return;
    const sec = document.createElement('div');
    sec.className = 'wikt-section wikt-content';
    sec.appendChild(buf);
    wrap.appendChild(sec);
    buf = null;
  }

  for (let i = 0; i < children.length; i++) {
    const el  = children[i];
    const tag = el.tagName;

    if (tag === 'H3') {
      flush();
      const title = el.textContent.replace(/\[.*?\]/g,'').trim();
      skip = REMOVE_SECTIONS.has(normSec(title));
      if (skip) continue;
      secCount++;
      if (secCount === 3 && !adDone) {
        adDone = true;
        const ad = document.createElement('div');
        ad.className = 'ad-inline';
        ad.innerHTML = '<!-- AdSense in-article unit -->\nadvertisement';
        wrap.appendChild(ad);
      }
      buf = document.createElement('div');
      const h = document.createElement('div');
      h.className = 'wikt-h3';
      h.textContent = title;
      buf.appendChild(h);
      continue;
    }

    if (skip) continue;
    if (!buf) continue;

    if (tag === 'H4') {
      const t = el.textContent.replace(/\[.*?\]/g,'').trim();
      if (REMOVE_SECTIONS.has(normSec(t))) { skip = true; continue; }
      skip = false;
      const h = document.createElement('div');
      h.className = 'wikt-h4';
      h.textContent = t;
      buf.appendChild(h);
      continue;
    }

    if (tag === 'H5') {
      const h = document.createElement('div');
      h.className = 'wikt-h5';
      h.textContent = el.textContent.replace(/\[.*?\]/g,'').trim();
      buf.appendChild(h);
      continue;
    }

    if (tag === 'OL') {
      const ol = document.createElement('ol');
      ol.className = 'wikt-ol';
      for (const li of el.querySelectorAll(':scope > li')) {
        const newLi = document.createElement('li');
        const clone = li.cloneNode(true);
        const nested = [...clone.querySelectorAll(':scope > dl, :scope > ul')];
        nested.forEach(n => n.remove());
        const defSpan = document.createElement('span');
        defSpan.className = 'def-text';
        defSpan.innerHTML = reorderLabels(clone.innerHTML.trim());
        const body = document.createElement('div');
        body.appendChild(defSpan);
        for (const n of nested) {
          body.appendChild(n.tagName === 'DL' ? renderDl(n) : renderUl(n));
        }
        newLi.appendChild(body);
        ol.appendChild(newLi);
      }
      buf.appendChild(ol);
      continue;
    }

    if (tag === 'DL') { buf.appendChild(renderDl(el)); continue; }

    if (tag === 'UL') {
      const links = [...el.querySelectorAll('a')];
      if (links.length) {
        const block = document.createElement('div');
        block.className = 'term-block';
        links.forEach(a => {
          const w = a.textContent.trim();
          if (!w) return;
          const chip = document.createElement('button');
          chip.className = 'term-chip';
          chip.textContent = w;
          chip.addEventListener('click', () => lookup(w));
          block.appendChild(chip);
        });
        buf.appendChild(block);
      } else {
        buf.appendChild(renderUl(el));
      }
      continue;
    }

    if (tag === 'P') {
      const p = el.cloneNode(true);
      p.style.cssText = 'font-size:0.92rem;line-height:1.65;margin-bottom:0.55rem;';
      buf.appendChild(p);
      continue;
    }

    if (tag === 'TABLE') { buf.appendChild(el.cloneNode(true)); continue; }

    if (tag === 'DIV' || tag === 'SECTION') {
      buf.appendChild(el.cloneNode(true));
      continue;
    }
  }
  flush();
  rewriteLinks(wrap);
  mainEl.innerHTML = '';
  mainEl.appendChild(wrap);
}

function renderDl(dl) {
  const c = document.createElement('div');
  c.className = 'wikt-dl';
  for (const dd of dl.querySelectorAll('dd')) {
    const newDd = document.createElement('dd');
    const clone = dd.cloneNode(true);
    const trEl  = clone.querySelector('.e-translation, [class*="translation"]');
    let trText  = '';
    if (trEl) { trText = trEl.textContent.trim(); trEl.remove(); }
    else {
      const m = clone.textContent.match(/[â€•â€”â€“]\s*(.+)$/);
      if (m) trText = m[1].trim();
    }
    newDd.innerHTML = clone.innerHTML.trim();
    if (trText) {
      const tr = document.createElement('span');
      tr.className = 'example-tr';
      tr.textContent = trText;
      newDd.appendChild(tr);
    }
    c.appendChild(newDd);
  }
  return c;
}

function renderUl(ul) {
  const n = document.createElement('ul');
  n.className = 'wikt-ul';
  n.innerHTML = ul.innerHTML;
  return n;
}

/* â”€â”€ HELPERS â”€â”€ */
function showError(msg) {
  mainEl.innerHTML = `<div class="state-error">${msg}</div>`;
}
function showSuggestions() {
  const div = document.createElement('div');
  div.className = 'suggestions';
  div.innerHTML = `<div class="suggestions-label">Try for example</div>
    ${SUGGESTIONS.map(w => `<button class="suggestion-btn">${esc(w)}</button>`).join('')}`;
  mainEl.appendChild(div);
  div.querySelectorAll('.suggestion-btn').forEach(b => {
    b.addEventListener('click', () => lookup(b.textContent.trim()));
  });
}
